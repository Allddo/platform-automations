name: Create Repository

on:
  workflow_dispatch:
    inputs:
      repo_name:
        required: true
        type: string
      public:
        required: true
        type: boolean  # ✅ Changed from 'toggle' to 'boolean'
        description: 'Make repository public?'

jobs:
  create-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Create Repository
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/user/repos \
          -d '{
            "name": "${{ github.event.inputs.repo_name }}",
            "private": ${{ github.event.inputs.public == false }}
          }'
        # ✅ Fixed the private logic (inverted boolean)
