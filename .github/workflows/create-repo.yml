name: Create GitHub Repository

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: 'Name of the new repository'
        required: true
        type: string
      public:
        description: 'Make repository public'
        required: true
        type: boolean
      port_context:
        description: 'Port context'
        required: false
        type: string

jobs:
  create-repository:
    runs-on: ubuntu-latest
    steps:
      - name: Log Inputs
        run: |
          echo "Repository Name: ${{ inputs.repo_name }}"
          echo "Public: ${{ inputs.public }}"

      - name: Inform Port - Starting
        if: inputs.port_context != ''
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ fromJson(inputs.port_context).runId }}
          status: IN_PROGRESS
          logMessage: "🚀 Starting repository creation for: ${{ inputs.repo_name }}"

      - name: Create GitHub Repository
        id: create_repo
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          REPO_NAME="${{ inputs.repo_name }}"
          IS_PUBLIC="${{ inputs.public }}"
          if [ "$IS_PUBLIC" = "true" ]; then
            VISIBILITY="public"
          else
            VISIBILITY="private"
          fi
          echo "Creating repository: Allddo/$REPO_NAME as $VISIBILITY"
          gh repo create "Allddo/$REPO_NAME" --$VISIBILITY
          echo "repo_url=https://github.com/Allddo/$REPO_NAME" >> "$GITHUB_OUTPUT"

      - name: Inform Port - Success
        if: success() && inputs.port_context != ''
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ fromJson(inputs.port_context).runId }}
          status: SUCCESS
          logMessage: |
            ✅ Repository created successfully!
            🔗 View at: ${{ steps.create_repo.outputs.repo_url }}

      - name: Inform Port - Failure
        if: failure() && inputs.port_context != ''
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ fromJson(inputs.port_context).runId }}
          status: FAILURE
          logMessage: "❌ Failed to create repository. Check the logs for details."
